AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: DataLens — agentic third-party data product discovery API

# ── Deploy ─────────────────────────────────────────────────────────────────────
# Prerequisites:
#   aws configure  (or set AWS_PROFILE)
#   sam build && sam deploy --guided   (first time — saves samconfig.toml)
#   sam deploy                         (subsequent deploys)
#
# The guided deploy will ask for:
#   Stack name, AWS region, ECR repo (SAM creates one), BedrockModelId,
#   allowed CORS origins, Datadog config.
#
# Bedrock model must be enabled in your account first:
#   Bedrock console → Model access → Enable chosen model
#
# After first deploy, seed the usage table:
#   python scripts/seed_dynamodb.py --table <UsageTableName stack output>
#
# Outputs the API Gateway URL — set VITE_API_URL= in frontend/.env.production

Globals:
  Function:
    Timeout: 300          # 5 min — agentic loops can be multi-step
    MemorySize: 1024      # LangChain/LangGraph benefit from headroom
    Architectures:
      - arm64             # Graviton2 — ~20% cheaper than x86, same perf

Parameters:
  BedrockModelId:
    Type: String
    Default: "anthropic.claude-3-5-sonnet-20241022-v2:0"
    Description: >
      Bedrock model ID for the DataLens agent.
      Must be enabled in your AWS account (Bedrock console → Model access).
      Options:
        anthropic.claude-3-5-sonnet-20241022-v2:0  (default — best tool use)
        anthropic.claude-3-haiku-20240307-v1:0      (faster, cheaper)
        anthropic.claude-3-sonnet-20240229-v1:0

  AllowedOrigins:
    Type: String
    Default: "https://your-frontend-domain.com"
    Description: Comma-separated CORS origins (CloudFront URL or custom domain)

  DatadogApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: Datadog API key (leave blank to disable Datadog extension)

  Environment:
    Type: String
    Default: production
    AllowedValues: [development, staging, production]

Resources:

  # ── DynamoDB — Usage Statistics ───────────────────────────────────────────────
  # Stores per-product usage stats (teams using it, query volume, active users).
  # Partition key: product_id (String) — matches product IDs in mock_data/data.py
  # Seeded by: python backend/scripts/seed_dynamodb.py
  UsageTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-usage-stats"
      BillingMode: PAY_PER_REQUEST    # no capacity planning needed, low traffic
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: product_id
          AttributeType: S
      KeySchema:
        - AttributeName: product_id
          KeyType: HASH
      Tags:
        - Key: Project
          Value: DataLens
        - Key: Environment
          Value: !Ref Environment

  # ── Lambda Function ───────────────────────────────────────────────────────────
  DataLensFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      Description: DataLens agentic data product discovery backend

      Environment:
        Variables:
          # Bedrock
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          AWS_REGION_NAME: !Ref AWS::Region   # explicit — boto3 picks this up
          # DynamoDB
          USAGE_TABLE_NAME: !Ref UsageTable
          # CORS
          ALLOWED_ORIGINS: !Ref AllowedOrigins
          # Datadog
          DD_API_KEY: !Ref DatadogApiKey
          DD_ENV: !Ref Environment
          DD_SERVICE: datalens
          DD_VERSION: "1.0.0"
          DD_TRACE_ENABLED: !If [DatadogEnabled, "true", "false"]
          # Powertools / structured logging
          LOG_LEVEL: INFO
          POWERTOOLS_SERVICE_NAME: datalens

      Policies:
        # ── Bedrock ─────────────────────────────────────────────────────────────
        # Allow the Lambda to invoke any Bedrock model in the account/region.
        # Scope this down to a specific model ARN in production if desired.
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource:
                - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-3-5-sonnet-20241022-v2:0"
                - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-3-haiku-20240307-v1:0"
                - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-3-sonnet-20240229-v1:0"

        # ── DynamoDB ─────────────────────────────────────────────────────────────
        # Read-only access to the usage stats table (agent only reads, never writes).
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Scan
                - dynamodb:Query
              Resource: !GetAtt UsageTable.Arn

      # API Gateway HTTP API — cheaper + faster than REST API for this use case
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref DataLensHttpApi
            Path: /{proxy+}
            Method: ANY
        # Root path (health check at /)
        RootEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref DataLensHttpApi
            Path: /
            Method: ANY

      # Optional: Datadog Lambda Extension layer for APM + log forwarding
      # Uncomment and set the correct region ARN from:
      # https://docs.datadoghq.com/serverless/installation/python/
      # Layers:
      #   - !If
      #     - DatadogEnabled
      #     - arn:aws:lambda:us-east-1:464622532012:layer:Datadog-Extension:65
      #     - !Ref AWS::NoValue

    Metadata:
      # SAM builds the Docker image and pushes to ECR automatically
      DockerTag: datalens-backend
      DockerContext: .        # backend/ directory
      Dockerfile: Dockerfile

  # ── HTTP API Gateway ──────────────────────────────────────────────────────────
  DataLensHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Description: DataLens API Gateway
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowedOrigins
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
        MaxAge: 300
      # Optional: add a custom domain via AWS::ApiGatewayV2::DomainName

  # ── CloudWatch Log Group ──────────────────────────────────────────────────────
  DataLensLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${DataLensFunction}"
      RetentionInDays: 30

Conditions:
  DatadogEnabled: !Not [!Equals [!Ref DatadogApiKey, ""]]

Outputs:
  ApiUrl:
    Description: >
      API Gateway endpoint URL — set this as VITE_API_URL in frontend/.env.production
      and update ALLOWED_ORIGINS to include your frontend CloudFront/domain URL.
    Value: !Sub "https://${DataLensHttpApi}.execute-api.${AWS::Region}.amazonaws.com"

  FunctionArn:
    Description: DataLens Lambda function ARN
    Value: !GetAtt DataLensFunction.Arn

  UsageTableName:
    Description: >
      DynamoDB usage stats table name.
      Seed it after first deploy: python scripts/seed_dynamodb.py --table <this value>
    Value: !Ref UsageTable

  UsageTableArn:
    Description: DynamoDB usage stats table ARN
    Value: !GetAtt UsageTable.Arn

  LogGroup:
    Description: CloudWatch log group (Datadog log forwarder should subscribe to this)
    Value: !Ref DataLensLogGroup
